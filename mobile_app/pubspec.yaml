name: english_trainer
description: English learning mobile application with AI-powered speaking practice
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  provider: ^6.1.1
  http: ^1.1.0
  json_annotation: ^4.8.1
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  audioplayers: ^5.2.1
  record: ^5.0.4
  permission_handler: ^11.0.1
  path_provider: ^2.1.1
  intl: ^0.18.1
  equatable: ^2.0.5
  dartz: ^0.10.1
  connectivity_plus: ^5.0.2
  flutter_bloc: ^8.1.3
  in_app_purchase: ^3.1.13
  in_app_purchase_android: ^0.3.0+18
  in_app_purchase_storekit: ^0.3.0+18

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1
  freezed: ^2.4.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
